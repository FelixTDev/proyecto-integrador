spring.application.name=proyecto-integrador-casachantilly
server.port=8081

# ── Datasource ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/PRUEBA_DB?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────────────────────────────────────────
app.jwt.secret=casachantilly-secret-key-desarrollo-2026-proyecto-integrador-utp-seguro
app.jwt.expiration-ms=86400000

# ── Swagger / OpenAPI ───────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
