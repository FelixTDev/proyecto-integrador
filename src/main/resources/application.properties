spring.application.name=proyecto-integrador-casachantilly
server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/prueba_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.open-in-view=false
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}

app.jwt.secret=${APP_JWT_SECRET:dev-only-change-me-please-dev-only-change-me-please}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.session.inactivity-minutes=${APP_SESSION_INACTIVITY_MINUTES:30}
app.operacion.max-pedidos-dia=${APP_OPERACION_MAX_PEDIDOS_DIA:200}
app.notificacion.canal-preferido=${APP_NOTIFICACION_CANAL_PREFERIDO:AUTO}
app.auth.login.max-attempts=${APP_AUTH_LOGIN_MAX_ATTEMPTS:5}
app.auth.login.window-seconds=${APP_AUTH_LOGIN_WINDOW_SECONDS:300}
app.auth.login.block-seconds=${APP_AUTH_LOGIN_BLOCK_SECONDS:900}
app.auth.reset.max-attempts=${APP_AUTH_RESET_MAX_ATTEMPTS:5}
app.auth.reset.window-seconds=${APP_AUTH_RESET_WINDOW_SECONDS:900}
app.auth.reset.block-seconds=${APP_AUTH_RESET_BLOCK_SECONDS:1800}
app.security.cors.allowed-origins=${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
app.pago.gateway=${APP_PAGO_GATEWAY:mock}
app.pago.culqi.base-url=${APP_PAGO_CULQI_BASE_URL:https://api.culqi.com/v2}
app.pago.culqi.secret-key=${APP_PAGO_CULQI_SECRET_KEY:}
app.notificacion.email.provider=${APP_NOTIFICACION_EMAIL_PROVIDER:mock}
app.notificacion.email.from=${APP_NOTIFICACION_EMAIL_FROM:no-reply@casachantilly.pe}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
management.endpoint.health.group.liveness.include=${MANAGEMENT_ENDPOINT_HEALTH_GROUP_LIVENESS_INCLUDE:livenessState,ping}
management.endpoint.health.group.readiness.include=${MANAGEMENT_ENDPOINT_HEALTH_GROUP_READINESS_INCLUDE:readinessState,db}
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
