server:
  port: ${SERVER_PORT}
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

management:
  health:
    mail:
      enabled: ${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState,ping
        readiness:
          include: readinessState,db

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  session:
    inactivity-minutes: ${APP_SESSION_INACTIVITY_MINUTES:30}
  operacion:
    max-pedidos-dia: ${APP_OPERACION_MAX_PEDIDOS_DIA:200}
  notificacion:
    canal-preferido: ${APP_NOTIFICACION_CANAL_PREFERIDO:AUTO}
  auth:
    login:
      max-attempts: ${APP_AUTH_LOGIN_MAX_ATTEMPTS:5}
      window-seconds: ${APP_AUTH_LOGIN_WINDOW_SECONDS:300}
      block-seconds: ${APP_AUTH_LOGIN_BLOCK_SECONDS:900}
    reset:
      max-attempts: ${APP_AUTH_RESET_MAX_ATTEMPTS:5}
      window-seconds: ${APP_AUTH_RESET_WINDOW_SECONDS:900}
      block-seconds: ${APP_AUTH_RESET_BLOCK_SECONDS:1800}
  security:
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS}
  pago:
    gateway: ${APP_PAGO_GATEWAY:culqi-http}
    culqi:
      base-url: ${APP_PAGO_CULQI_BASE_URL:https://api.culqi.com/v2}
      secret-key: ${APP_PAGO_CULQI_SECRET_KEY}
  notificacion:
    email:
      provider: ${APP_NOTIFICACION_EMAIL_PROVIDER:smtp}
      from: ${APP_NOTIFICACION_EMAIL_FROM}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
