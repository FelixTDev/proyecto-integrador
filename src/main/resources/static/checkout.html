<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Checkout — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#c9a96e;--accent:#d4856a;--bg:#0f0a08;--text:#f5f0e8;--muted:#9a8a7e;--border:rgba(201,169,110,.15);--gradient:linear-gradient(135deg,#c9a96e,#d4856a)}
    *{box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
    .nav-custom{background:rgba(15,10,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 0;position:sticky;top:0;z-index:100}
    .nav-brand{font-family:'Playfair Display',serif;font-size:1.4rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
    .page-title{font-family:'Playfair Display',serif;font-size:2rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:2rem 0 1.5rem}
    .ch-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
    .form-label{color:var(--muted);font-size:.82rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
    .form-control,.form-select{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:.7rem 1rem}
    .form-control:focus,.form-select:focus{background:rgba(255,255,255,.07);border-color:var(--primary);box-shadow:0 0 0 3px rgba(201,169,110,.15);color:var(--text)}
    .form-select option{background:#16100c;color:var(--text)}
    .sum-row{display:flex;justify-content:space-between;padding:.45rem 0;font-size:.92rem}
    .sum-total{font-size:1.3rem;font-weight:700;color:var(--primary);border-top:1px solid var(--border);padding-top:.8rem;margin-top:.5rem}
    .btn-gold{background:var(--gradient);border:none;color:#fff;font-weight:600;border-radius:12px;padding:.85rem;width:100%;font-size:1.05rem;transition:all .3s;cursor:pointer}
    .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,169,110,.35);color:#fff}
    .btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .alert-err{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.2);color:#ff6b6b;border-radius:12px;padding:.7rem 1rem;font-size:.85rem;display:none}
    .alert-ok{background:rgba(52,199,89,.1);border:1px solid rgba(52,199,89,.2);color:#34c759;border-radius:12px;padding:.7rem 1rem;font-size:.85rem;display:none}
    .item-line{display:flex;justify-content:space-between;padding:.4rem 0;font-size:.88rem;border-bottom:1px solid rgba(201,169,110,.08)}
    .link{color:var(--primary);text-decoration:none}.link:hover{color:var(--accent)}
    .secure-badge{font-size:.75rem;color:var(--muted);text-align:center;margin-top:1rem}
    .secure-badge i{color:#34c759}
    .step-num{width:28px;height:28px;border-radius:50%;background:var(--gradient);color:#fff;font-weight:700;font-size:.82rem;display:inline-flex;align-items:center;justify-content:center;margin-right:.6rem}
    .step-title{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:1rem}
    .spin{animation:spn 1s linear infinite;display:inline-block}@keyframes spn{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<nav class="nav-custom">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="/" class="nav-brand">Casa Chantilly</a>
    <a href="/carrito.html" class="link" style="font-size:.88rem"><i class="bi bi-arrow-left me-1"></i>Volver al carrito</a>
  </div>
</nav>

<main class="container pb-5">
  <h1 class="page-title"><i class="bi bi-credit-card me-2"></i>Checkout</h1>
  <div class="alert-err" id="error"></div>
  <div class="alert-ok" id="success"></div>

  <div class="row g-4">
    <!-- LEFT: Forms -->
    <div class="col-lg-7">
      <!-- Step 1: Delivery -->
      <div class="ch-card mb-3">
        <div class="step-title"><span class="step-num">1</span>Entrega</div>
        <div class="mb-3">
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipo" id="tipoDelivery" value="delivery" checked>
            <label class="form-check-label" for="tipoDelivery" style="color:var(--text)">Delivery</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="tipo" id="tipoRecojo" value="recojo">
            <label class="form-check-label" for="tipoRecojo" style="color:var(--text)">Recojo en tienda</label>
          </div>
        </div>
        <div id="dirSection">
          <div class="mb-3">
            <label class="form-label">Dirección de entrega</label>
            <input type="text" class="form-control" id="direccion" placeholder="Av. Principal 123, Miraflores"/>
          </div>
        </div>
      </div>

      <!-- Step 2: Payment -->
      <div class="ch-card">
        <div class="step-title"><span class="step-num">2</span>Pago</div>
        <div class="mb-3">
          <label class="form-label">Método de pago</label>
          <select class="form-select" id="metodoPago">
            <option value="1">Tarjeta de crédito/débito</option>
            <option value="2">Yape</option>
            <option value="3">Plin</option>
            <option value="4">Efectivo contra entrega</option>
          </select>
        </div>
        <div id="cardSection">
          <div class="mb-3">
            <label class="form-label">Número de tarjeta</label>
            <input type="text" class="form-control" id="cardNumber" placeholder="4111 1111 1111 1111" maxlength="19"/>
          </div>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label">Expiración</label>
              <input type="text" class="form-control" id="cardExp" placeholder="MM/YY" maxlength="5"/>
            </div>
            <div class="col-6">
              <label class="form-label">CVV</label>
              <input type="text" class="form-control" id="cardCvv" placeholder="123" maxlength="4"/>
            </div>
          </div>
          <div class="mb-3 mt-3">
            <label class="form-label">Email (para recibo)</label>
            <input type="email" class="form-control" id="emailPago" placeholder="tu@email.com"/>
          </div>
        </div>
        <p class="secure-badge"><i class="bi bi-shield-check me-1"></i>Pago procesado de forma segura con Culqi</p>
      </div>
    </div>

    <!-- RIGHT: Summary -->
    <div class="col-lg-5">
      <div class="ch-card" style="position:sticky;top:100px">
        <h6 style="font-family:'Playfair Display',serif;margin-bottom:1rem">Resumen del pedido</h6>
        <div id="itemsList"></div>
        <div class="mt-3">
          <div class="sum-row"><span>Subtotal</span><span id="chkSub">S/ 0.00</span></div>
          <div class="sum-row"><span>IGV (18%)</span><span id="chkIgv">S/ 0.00</span></div>
          <div class="sum-row sum-total"><span>Total a pagar</span><span id="chkTotal">S/ 0.00</span></div>
        </div>
        <button class="btn-gold mt-3" id="btnPagar" onclick="procesarPago()">
          <span id="payText"><i class="bi bi-lock me-1"></i>Pagar ahora</span>
          <span id="paySpinner" style="display:none"><i class="bi bi-arrow-repeat spin"></i> Procesando pago…</span>
        </button>
      </div>
    </div>
  </div>
</main>

<!-- Culqi.js (en producción se carga el SDK real) -->
<!-- <script src="https://checkout.culqi.com/js/v4"></script> -->

<script>
  const jwt=localStorage.getItem('jwt');
  const H={'Content-Type':'application/json'};
  if(jwt)H['Authorization']='Bearer '+jwt;

  let carritoData=null;

  // Toggle delivery/recojo
  document.querySelectorAll('input[name="tipo"]').forEach(r=>{
    r.addEventListener('change',()=>{
      document.getElementById('dirSection').style.display=r.value==='delivery'?'block':'none';
    });
  });

  // Toggle card section by payment method
  document.getElementById('metodoPago').addEventListener('change',e=>{
    document.getElementById('cardSection').style.display=e.target.value==='1'?'block':'none';
  });

  // Format card number
  document.getElementById('cardNumber').addEventListener('input',e=>{
    let v=e.target.value.replace(/\D/g,'').substring(0,16);
    e.target.value=v.replace(/(.{4})/g,'$1 ').trim();
  });

  // Load cart summary
  document.addEventListener('DOMContentLoaded',async()=>{
    if(!jwt){window.location.href='/login.html';return}
    document.getElementById('emailPago').value=localStorage.getItem('email')||'';
    try{
      const res=await fetch('/api/carrito',{headers:H});
      const json=await res.json();
      carritoData=json.data;
      renderSummary(carritoData);
    }catch(e){console.error(e)}
  });

  function renderSummary(cart){
    if(!cart||!cart.items||cart.items.length===0){
      document.getElementById('itemsList').innerHTML='<p style="color:var(--muted);font-size:.88rem">Carrito vacío</p>';
      document.getElementById('btnPagar').disabled=true;return;
    }
    document.getElementById('itemsList').innerHTML=cart.items.map(it=>
      `<div class="item-line"><span>${it.productoNombre} × ${it.cantidad}</span><span style="color:var(--primary)">S/ ${Number(it.subtotal).toFixed(2)}</span></div>`
    ).join('');
    document.getElementById('chkSub').textContent='S/ '+Number(cart.subtotal).toFixed(2);
    document.getElementById('chkIgv').textContent='S/ '+Number(cart.igv).toFixed(2);
    document.getElementById('chkTotal').textContent='S/ '+Number(cart.total).toFixed(2);
  }

  async function procesarPago(){
    const err=document.getElementById('error');const ok=document.getElementById('success');
    err.style.display='none';ok.style.display='none';
    if(!carritoData||!carritoData.items||carritoData.items.length===0){
      err.textContent='Carrito vacío';err.style.display='block';return;
    }

    document.getElementById('payText').style.display='none';
    document.getElementById('paySpinner').style.display='inline';
    document.getElementById('btnPagar').disabled=true;

    // En producción: Culqi.createToken() genera el token real
    // Aquí simulamos un token
    const cardNum=document.getElementById('cardNumber').value.replace(/\s/g,'');
    const tokenTarjeta='tkn_test_'+cardNum.substring(0,4)+'_'+Date.now();

    const esRecojo=document.getElementById('tipoRecojo').checked;
    const body={
      carritoId:carritoData.id,
      tokenTarjeta:tokenTarjeta,
      direccionId:null,
      franjaHorariaId:null,
      esRecojoTienda:esRecojo,
      email:document.getElementById('emailPago').value||null,
      metodoPagoId:parseInt(document.getElementById('metodoPago').value)
    };

    try{
      const res=await fetch('/api/pagos/procesar',{method:'POST',headers:H,body:JSON.stringify(body)});
      const json=await res.json();
      if(json.data&&json.data.aprobado){
        ok.innerHTML=`<i class="bi bi-check-circle me-1"></i>${json.data.mensaje} — Pedido #${json.data.pedidoId}<br><small>Ref: ${json.data.referenciaExterna}</small>`;
        ok.style.display='block';
        document.getElementById('btnPagar').style.display='none';
        // Limpiar carrito visual
        document.getElementById('itemsList').innerHTML='<p style="color:#34c759;font-size:.88rem"><i class="bi bi-check-circle me-1"></i>Pedido creado exitosamente</p>';
      }else{
        err.textContent=json.data?json.data.mensaje:(json.message||'Pago rechazado');
        err.style.display='block';
        document.getElementById('btnPagar').disabled=false;
      }
    }catch(e){
      err.textContent='Error de conexión con la pasarela de pago';err.style.display='block';
      document.getElementById('btnPagar').disabled=false;
    }finally{
      document.getElementById('payText').style.display='inline';
      document.getElementById('paySpinner').style.display='none';
    }
  }
</script>
</body>
</html>
