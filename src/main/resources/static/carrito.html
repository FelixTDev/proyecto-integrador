<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mi Carrito — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#c9a96e;--accent:#d4856a;--bg:#0f0a08;--text:#f5f0e8;--muted:#9a8a7e;--border:rgba(201,169,110,.15);--gradient:linear-gradient(135deg,#c9a96e,#d4856a)}
    *{box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
    .nav-custom{background:rgba(15,10,8,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:1rem 0;position:sticky;top:0;z-index:100}
    .nav-brand{font-family:'Playfair Display',serif;font-size:1.4rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
    .page-title{font-family:'Playfair Display',serif;font-size:2rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:2rem 0 1.5rem}
    .cart-table{width:100%;border-collapse:separate;border-spacing:0}
    .cart-table th{color:var(--muted);font-size:.75rem;letter-spacing:1px;text-transform:uppercase;padding:.8rem 1rem;border-bottom:1px solid var(--border);font-weight:600}
    .cart-table td{padding:.9rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle}
    .item-name{font-weight:600;font-size:.95rem}.item-variant{color:var(--muted);font-size:.82rem}
    .qty-wrap{display:flex;align-items:center;gap:.5rem}
    .qty-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .qty-btn:hover{background:var(--primary);border-color:var(--primary);color:#000}
    .qty-val{font-weight:600;min-width:30px;text-align:center}
    .btn-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;transition:color .2s}.btn-del:hover{color:#ff453a}
    .price{color:var(--primary);font-weight:700}
    .summary-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:16px;padding:1.5rem;position:sticky;top:100px}
    .sum-row{display:flex;justify-content:space-between;padding:.5rem 0;font-size:.92rem}
    .sum-total{font-size:1.3rem;font-weight:700;color:var(--primary);border-top:1px solid var(--border);padding-top:.8rem;margin-top:.5rem}
    .btn-gold{background:var(--gradient);border:none;color:#fff;font-weight:600;border-radius:12px;padding:.75rem;width:100%;font-size:1rem;transition:all .3s;text-decoration:none;display:block;text-align:center}
    .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,169,110,.35);color:#fff}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:.6rem;width:100%;font-size:.88rem;transition:all .3s;cursor:pointer;text-align:center}
    .btn-outline:hover{border-color:var(--primary);color:var(--primary)}
    .empty-cart{text-align:center;padding:4rem 1rem;color:var(--muted)}.empty-cart i{font-size:3.5rem;opacity:.4;margin-bottom:1rem}
    .link{color:var(--primary);text-decoration:none}.link:hover{color:var(--accent)}
    .skeleton{background:linear-gradient(90deg,#1a130a 25%,#261d12 50%,#1a130a 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:16px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    @media(max-width:768px){.cart-table{font-size:.85rem}.cart-table th:nth-child(4),.cart-table td:nth-child(4){display:none}}
  </style>
</head>
<body>
<nav class="nav-custom">
  <div class="container d-flex align-items-center justify-content-between">
    <a href="/" class="nav-brand">Casa Chantilly</a>
    <div class="d-flex gap-3 align-items-center">
      <a href="/" class="link" style="font-size:.88rem"><i class="bi bi-arrow-left me-1"></i>Catálogo</a>
      <span id="userBadge" style="font-size:.82rem;color:var(--muted)"></span>
    </div>
  </div>
</nav>

<main class="container">
  <h1 class="page-title"><i class="bi bi-cart3 me-2"></i>Mi Carrito</h1>

  <div id="authWall" style="display:none">
    <div class="empty-cart">
      <i class="bi bi-lock"></i>
      <p>Debes iniciar sesión para ver tu carrito</p>
      <a href="/login.html" class="btn-gold" style="max-width:240px;margin:1rem auto">Iniciar Sesión</a>
    </div>
  </div>

  <div id="cartContent" style="display:none">
    <div class="row g-4">
      <!-- Table -->
      <div class="col-lg-8">
        <div style="overflow-x:auto">
          <table class="cart-table" id="cartTable">
            <thead><tr><th>Producto</th><th>Precio</th><th>Cantidad</th><th>Subtotal</th><th></th></tr></thead>
            <tbody id="cartBody"></tbody>
          </table>
        </div>
        <div id="emptyMsg" class="empty-cart" style="display:none">
          <i class="bi bi-cart-x"></i>
          <p>Tu carrito está vacío</p>
          <a href="/" class="btn-gold" style="max-width:240px;margin:1rem auto">Explorar catálogo</a>
        </div>
      </div>
      <!-- Summary -->
      <div class="col-lg-4">
        <div class="summary-card" id="summaryCard" style="display:none">
          <h6 style="font-family:'Playfair Display',serif;margin-bottom:1rem">Resumen del pedido</h6>
          <div class="sum-row"><span>Subtotal</span><span id="sumSub">S/ 0.00</span></div>
          <div class="sum-row"><span>IGV (18%)</span><span id="sumIgv">S/ 0.00</span></div>
          <div class="sum-row sum-total"><span>Total</span><span id="sumTotal">S/ 0.00</span></div>
          <a href="/checkout.html" class="btn-gold mt-3">Proceder al pago <i class="bi bi-arrow-right ms-1"></i></a>
          <button class="btn-outline mt-2" onclick="vaciarCarrito()">Vaciar carrito</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
  const jwt=localStorage.getItem('jwt');
  const headers={'Content-Type':'application/json'};
  if(jwt) headers['Authorization']='Bearer '+jwt;

  document.addEventListener('DOMContentLoaded',()=>{
    if(!jwt){document.getElementById('authWall').style.display='block';return}
    document.getElementById('cartContent').style.display='block';
    document.getElementById('userBadge').textContent=localStorage.getItem('email')||'';
    loadCart();
  });

  async function loadCart(){
    try{
      const res=await fetch('/api/carrito',{headers});
      if(res.status===401||res.status===403){document.getElementById('authWall').style.display='block';document.getElementById('cartContent').style.display='none';return}
      const json=await res.json();renderCart(json.data);
    }catch(e){console.error(e)}
  }

  function renderCart(cart){
    const body=document.getElementById('cartBody');
    const empty=document.getElementById('emptyMsg');
    const summary=document.getElementById('summaryCard');
    if(!cart||!cart.items||cart.items.length===0){
      body.innerHTML='';empty.style.display='block';summary.style.display='none';return;
    }
    empty.style.display='none';summary.style.display='block';
    body.innerHTML=cart.items.map(it=>`
      <tr>
        <td><div class="item-name">${it.productoNombre}</div><div class="item-variant">${it.varianteNombre}</div></td>
        <td class="price">S/ ${Number(it.precioUnitario).toFixed(2)}</td>
        <td>
          <div class="qty-wrap">
            <button class="qty-btn" onclick="updateQty(${it.detalleId},${it.cantidad-1})"><i class="bi bi-dash"></i></button>
            <span class="qty-val">${it.cantidad}</span>
            <button class="qty-btn" onclick="updateQty(${it.detalleId},${it.cantidad+1})" ${it.cantidad>=it.stockDisponible?'disabled style=\"opacity:.3\"':''}><i class="bi bi-plus"></i></button>
          </div>
        </td>
        <td class="price">S/ ${Number(it.subtotal).toFixed(2)}</td>
        <td><button class="btn-del" onclick="removeItem(${it.detalleId})"><i class="bi bi-trash3"></i></button></td>
      </tr>`).join('');
    document.getElementById('sumSub').textContent='S/ '+Number(cart.subtotal).toFixed(2);
    document.getElementById('sumIgv').textContent='S/ '+Number(cart.igv).toFixed(2);
    document.getElementById('sumTotal').textContent='S/ '+Number(cart.total).toFixed(2);
  }

  async function updateQty(detalleId,qty){
    if(qty<=0) return removeItem(detalleId);
    try{
      const res=await fetch(`/api/carrito/items/${detalleId}?cantidad=${qty}`,{method:'PUT',headers});
      const json=await res.json();if(!json.success){alert(json.message);return}renderCart(json.data);
    }catch(e){console.error(e)}
  }

  async function removeItem(detalleId){
    try{
      const res=await fetch(`/api/carrito/items/${detalleId}`,{method:'DELETE',headers});
      const json=await res.json();renderCart(json.data);
    }catch(e){console.error(e)}
  }

  async function vaciarCarrito(){
    if(!confirm('¿Vaciar todo el carrito?'))return;
    try{await fetch('/api/carrito',{method:'DELETE',headers});loadCart()}catch(e){console.error(e)}
  }
</script>
</body>
</html>
