<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Iniciar Sesión — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .auth-wrap { width: 100%; max-width: 440px; }
    .brand-link {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 700;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center; display: block; margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }
    .auth-sub { text-align: center; color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; }
    .auth-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      position: relative; overflow: hidden;
    }
    .auth-box::before {
      content: '';
      position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 60% 30%, rgba(201,169,110,0.05), transparent 60%);
      pointer-events: none;
    }
    .form-row { display: flex; flex-direction: column; gap: 1rem; }
    .pw-wrap { position: relative; }
    .pw-wrap .input { padding-right: 2.5rem; }
    .pw-toggle {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); font-size: 1rem;
      transition: color var(--fast);
    }
    .pw-toggle:hover { color: var(--text); }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: var(--muted); }
    .auth-footer a { color: var(--gold); font-weight: 500; }
    .auth-footer a:hover { color: var(--rose); }
    .divider-text {
      display: flex; align-items: center; gap: 0.75rem;
      color: var(--muted); font-size: 0.8rem; margin: 1rem 0;
    }
    .divider-text::before, .divider-text::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <a href="../../index.html" class="brand-link">Casa Chantilly</a>
    <p class="auth-sub">Pasteles Artesanales — Lima</p>

    <div class="auth-box">
      <div class="alert alert-err" id="err"></div>

      <div class="form-row">
        <div class="field">
          <label class="label">Correo electrónico</label>
          <input type="email" id="email" class="input" placeholder="tu@correo.com" required/>
        </div>
        <div class="field">
          <label class="label">Contraseña</label>
          <div class="pw-wrap">
            <input type="password" id="password" class="input" placeholder="••••••••" required/>
            <button type="button" class="pw-toggle" onclick="togglePw()">
              <i class="bi bi-eye" id="pw-icon"></i>
            </button>
          </div>
        </div>

        <button class="btn btn-gold btn-lg btn-full mt-2" id="btn-login" onclick="doLogin()">
          <span id="btn-text"><i class="bi bi-box-arrow-in-right"></i> Ingresar</span>
          <span id="btn-spinner" style="display:none"><i class="bi bi-arrow-repeat spin"></i> Verificando…</span>
        </button>
      </div>
    </div>

    <p class="auth-footer">
      ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
    </p>
    <p class="auth-footer mt-1">
      <a href="../../index.html"><i class="bi bi-arrow-left"></i> Volver al catálogo</a>
    </p>
  </div>

  <script src="../../js/app.js"></script>
  <script>
    // Si ya está logueado, redirigir
    if (Auth.isLoggedIn()) window.location.href = '../../index.html';

    function togglePw() {
      const p = document.getElementById('password');
      const i = document.getElementById('pw-icon');
      if (p.type === 'password') { p.type = 'text'; i.className = 'bi bi-eye-slash'; }
      else { p.type = 'password'; i.className = 'bi bi-eye'; }
    }

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const err      = document.getElementById('err');
      err.classList.remove('show');

      if (!email || !password) { err.textContent = 'Completa todos los campos.'; err.classList.add('show'); return; }

      document.getElementById('btn-text').style.display    = 'none';
      document.getElementById('btn-spinner').style.display = 'inline-flex';
      document.getElementById('btn-login').disabled = true;

      try {
        const json = await API.post('/api/auth/login', { email, password });
        if (!json.success) throw new Error(json.message || 'Credenciales incorrectas');
        Auth.save(json.data.token, json.data.email);
        // Redirigir según rol
        if (Auth.isAdmin()) window.location.href = '../admin/dashboard.html';
        else window.location.href = '../../index.html';
      } catch (e) {
        err.textContent = e.message;
        err.classList.add('show');
        document.getElementById('btn-text').style.display    = 'inline-flex';
        document.getElementById('btn-spinner').style.display = 'none';
        document.getElementById('btn-login').disabled = false;
      }
    }

    // Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>
