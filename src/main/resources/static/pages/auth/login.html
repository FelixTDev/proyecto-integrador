<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Ingresar - Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <link rel="stylesheet" href="../../css/cliente-theme.css"/>
  <link rel="stylesheet" href="../../css/auth-theme.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-icon-wrap"><i class="bi bi-shop"></i></div>
      <h1 class="h3 auth-title">Bienvenido de vuelta</h1>
      <p class="auth-subtitle mb-0">Ingresa para gestionar tus pedidos y preferencias.</p>
    </div>

    <form id="loginForm" class="field auth-form">
      <div class="field">
        <label class="label">Correo electronico</label>
        <input type="email" id="f-email" class="form-control" required placeholder="tu@email.com" autocomplete="email">
      </div>

      <div class="field">
        <div class="d-flex justify-content-between align-items-center">
          <label class="label mb-0">Contrasena</label>
          <a href="#" class="auth-forgot text-decoration-none" aria-disabled="true">Recuperacion proxima</a>
        </div>
        <input type="password" id="f-pwd" class="form-control" required placeholder="********" autocomplete="current-password">
      </div>

      <button type="submit" id="btn-submit" class="btn btn-brand w-100">Ingresar</button>

      <div class="auth-links">
        No tienes cuenta? <a href="registro.html" class="text-decoration-none">Registrate aqui</a>
      </div>

      <div class="auth-back">
        <a href="../../index.html" class="btn btn-soft btn-sm"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/core/config.js"></script>
<script src="../../js/core/storage.js"></script>
<script src="../../js/auth/session.js"></script>
<script src="../../js/components/toast.js"></script>
<script src="../../js/services/http.js"></script>
<script src="../../js/utils/format.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/auth/login.js"></script>
</body>
</html>
