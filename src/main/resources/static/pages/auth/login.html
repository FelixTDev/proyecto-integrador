<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Ingresar — La Casa del Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
      background: var(--bg-2);
      position: relative; overflow: hidden;
    }
    .auth-page::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at top left, rgba(204,32,32,0.15) 0%, transparent 50%),
                  radial-gradient(circle at bottom right, rgba(245,197,24,0.05) 0%, transparent 40%);
      pointer-events: none;
    }
    .auth-card {
      width: 100%; max-width: 420px;
      position: relative; z-index: 10;
    }
    .auth-brand {
      text-align: center; margin-bottom: 2rem;
    }
    .auth-brand i { font-size: 2.5rem; color: var(--gold); }
    .auth-brand h1 { font-family: var(--font-display); font-size: 2rem; color: var(--white); margin-top: 0.5rem; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="card auth-card">
    <div class="auth-brand">
      <i class="bi bi-shop"></i>
      <h1>Bienvenido de vuelta</h1>
    </div>
    
    <form id="loginForm" class="field" style="gap:1.25rem" onsubmit="doLogin(event)">
      <div class="field">
        <label class="label">Correo Electrónico</label>
        <input type="email" id="f-email" class="input" required placeholder="tu@email.com">
      </div>
      <div class="field">
        <div class="flex-between">
          <label class="label">Contraseña</label>
          <a href="#" style="font-size:0.75rem;color:var(--gold)">¿Olvidaste tu contraseña?</a>
        </div>
        <input type="password" id="f-pwd" class="input" required placeholder="••••••••">
      </div>
      
      <button type="submit" id="btn-submit" class="btn btn-primary btn-full mt-1">Ingresar</button>
      
      <div class="divider"></div>
      
      <p style="text-align:center;font-size:0.85rem;color:var(--text-2)">
        ¿No tienes cuenta? <a href="registro.html" style="color:var(--gold);font-weight:600">Regístrate aquí</a>
      </p>
      <div style="text-align:center;margin-top:1rem">
        <a href="../../index.html" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
      </div>
    </form>
  </div>
</div>

<script src="../../js/app.js"></script>
<script>
  if (Auth.isLoggedIn()) { window.location.href = Auth.isAdmin() ? '/pages/admin/dashboard.html' : '../../index.html'; }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const email = document.getElementById('f-email').value.trim();
    const pwd = document.getElementById('f-pwd').value.trim();

    try {
      btn.disabled = true; btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Ingresando...';
      const res = await API.post('/api/auth/login', { email, password: pwd });
      
      // Ajuste si devuelve {success, data:{token, email}} o {token, email} directo
      const token = res.data ? res.data.token : res.token;
      if (!token) throw new Error('Token no devuelto');
      
      Auth.save(token, email);
      Toast.ok('¡Bienvenido!');
      setTimeout(() => {
        window.location.href = Auth.isAdmin() ? '/pages/admin/dashboard.html' : '../../index.html';
      }, 700);
    } catch (err) {
      Toast.err('Credenciales inválidas');
      btn.disabled = false; btn.innerHTML = 'Ingresar';
    }
  }
</script>
</body>
</html>
