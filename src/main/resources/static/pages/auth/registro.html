<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Crear Cuenta — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .auth-wrap { width:100%; max-width:460px; }
    .brand-link {
      font-family:var(--font-display); font-size:2rem; font-weight:700;
      background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; text-align:center; display:block; margin-bottom:0.4rem;
    }
    .auth-sub { text-align:center; color:var(--muted); font-size:.88rem; margin-bottom:1.75rem; }
    .auth-box {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius-xl); padding:2rem;
      position:relative; overflow:hidden;
    }
    .auth-box::before {
      content:''; position:absolute; top:-50%; left:-50%;
      width:200%; height:200%;
      background:radial-gradient(circle at 40% 20%, rgba(201,169,110,0.05), transparent 60%);
      pointer-events:none;
    }
    .form-row { display:flex; flex-direction:column; gap:1rem; }
    .grid-2f { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .auth-footer { text-align:center; margin-top:1.25rem; font-size:.875rem; color:var(--muted); }
    .auth-footer a { color:var(--gold); font-weight:500; }
    @media(max-width:400px) { .grid-2f { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <a href="../../index.html" class="brand-link">Casa Chantilly</a>
    <p class="auth-sub">Crea tu cuenta y empieza a pedir</p>

    <div class="auth-box">
      <div class="alert alert-err" id="err"></div>
      <div class="alert alert-ok"  id="ok"></div>

      <div class="form-row">
        <div class="field">
          <label class="label">Nombre completo</label>
          <input type="text" id="nombre" class="input" placeholder="Tu nombre completo" required/>
        </div>
        <div class="grid-2f">
          <div class="field">
            <label class="label">Correo electrónico</label>
            <input type="email" id="email" class="input" placeholder="tu@correo.com" required/>
          </div>
          <div class="field">
            <label class="label">Teléfono <span style="color:var(--muted);font-weight:400">(opcional)</span></label>
            <input type="tel" id="telefono" class="input" placeholder="987 654 321"/>
          </div>
        </div>
        <div class="field">
          <label class="label">Contraseña</label>
          <input type="password" id="password" class="input" placeholder="Mínimo 6 caracteres" minlength="6" required/>
        </div>
        <div class="field">
          <label class="label">Confirmar contraseña</label>
          <input type="password" id="password2" class="input" placeholder="Repite tu contraseña" required/>
        </div>

        <button class="btn btn-gold btn-lg btn-full mt-1" id="btn-reg" onclick="doRegistro()">
          <span id="btn-text"><i class="bi bi-person-plus"></i> Crear cuenta</span>
          <span id="btn-spinner" style="display:none"><i class="bi bi-arrow-repeat spin"></i> Creando…</span>
        </button>
      </div>
    </div>

    <p class="auth-footer">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
    </p>
    <p class="auth-footer mt-1">
      <a href="../../index.html"><i class="bi bi-arrow-left"></i> Volver al catálogo</a>
    </p>
  </div>

  <script src="../../js/app.js"></script>
  <script>
    if (Auth.isLoggedIn()) window.location.href = '../../index.html';

    async function doRegistro() {
      const nombre   = document.getElementById('nombre').value.trim();
      const email    = document.getElementById('email').value.trim();
      const telefono = document.getElementById('telefono').value.trim();
      const password = document.getElementById('password').value;
      const password2= document.getElementById('password2').value;
      const err = document.getElementById('err');
      const ok  = document.getElementById('ok');
      err.classList.remove('show'); ok.classList.remove('show');

      if (!nombre || !email || !password) { err.textContent = 'Completa los campos requeridos.'; err.classList.add('show'); return; }
      if (password !== password2) { err.textContent = 'Las contraseñas no coinciden.'; err.classList.add('show'); return; }
      if (password.length < 6) { err.textContent = 'La contraseña debe tener al menos 6 caracteres.'; err.classList.add('show'); return; }

      document.getElementById('btn-text').style.display    = 'none';
      document.getElementById('btn-spinner').style.display = 'inline-flex';
      document.getElementById('btn-reg').disabled = true;

      try {
        const json = await API.post('/api/auth/registro', { nombre, email, password, telefono: telefono || null });
        if (!json.success) throw new Error(json.message || 'Error al registrar');
        Auth.save(json.data.token, json.data.email);
        ok.textContent = '¡Cuenta creada! Redirigiendo al catálogo…';
        ok.classList.add('show');
        setTimeout(() => window.location.href = '../../index.html', 1500);
      } catch(e) {
        err.textContent = e.message;
        err.classList.add('show');
        document.getElementById('btn-text').style.display    = 'inline-flex';
        document.getElementById('btn-spinner').style.display = 'none';
        document.getElementById('btn-reg').disabled = false;
      }
    }
  </script>
</body>
</html>
