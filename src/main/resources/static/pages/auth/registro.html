<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Regístrate — La Casa del Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem 1.5rem;
      background: var(--bg-2);
      position: relative; overflow: hidden;
    }
    .auth-page::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at top right, rgba(204,32,32,0.15) 0%, transparent 50%),
                  radial-gradient(circle at bottom left, rgba(245,197,24,0.05) 0%, transparent 40%);
      pointer-events: none;
    }
    .auth-card {
      width: 100%; max-width: 480px;
      position: relative; z-index: 10;
    }
    .auth-brand { text-align: center; margin-bottom: 2rem; }
    .auth-brand i { font-size: 2.5rem; color: var(--gold); }
    .auth-brand h1 { font-family: var(--font-display); font-size: 2rem; color: var(--white); margin-top: 0.5rem; }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="card auth-card">
    <div class="auth-brand">
      <i class="bi bi-person-heart"></i>
      <h1>Únete a nuestra familia</h1>
    </div>
    
    <form id="regForm" class="field" style="gap:1rem" onsubmit="doRegistro(event)">
      <div class="field">
        <label class="label">Nombres Completos</label>
        <input type="text" id="f-nombre" class="input" required placeholder="Tus nombres">
      </div>
      <div class="field">
        <label class="label">Correo Electrónico</label>
        <input type="email" id="f-email" class="input" required placeholder="tu@email.com">
      </div>
      <div class="grid-2" style="gap:1rem">
        <div class="field">
          <label class="label">Contraseña</label>
          <input type="password" id="f-pwd" class="input" required placeholder="Mínimo 6 carácteres">
        </div>
        <div class="field">
          <label class="label">Celular (Opcional)</label>
          <input type="text" id="f-tel" class="input" placeholder="987654321">
        </div>
      </div>
      
      <button type="submit" id="btn-submit" class="btn btn-primary btn-full mt-2">Crear mi cuenta</button>
      
      <div class="divider"></div>
      
      <p style="text-align:center;font-size:0.85rem;color:var(--text-2)">
        ¿Ya tienes cuenta? <a href="login.html" style="color:var(--gold);font-weight:600">Ingresa aquí</a>
      </p>
      <div style="text-align:center;margin-top:1rem">
        <a href="../../index.html" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
      </div>
    </form>
  </div>
</div>

<script src="../../js/app.js"></script>
<script>
  if (Auth.isLoggedIn()) { window.location.href = '../../index.html'; }

  async function doRegistro(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const nombre = document.getElementById('f-nombre').value.trim();
    const email = document.getElementById('f-email').value.trim();
    const pwd = document.getElementById('f-pwd').value.trim();
    const tel = document.getElementById('f-tel').value.trim();

    try {
      btn.disabled = true; btn.innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Registrando...';
      const res = await API.post('/api/auth/registro', { nombre, email, password: pwd, telefono: tel || null });
      
      const token = typeof res === 'string' ? res : (res.data?.token || res.token);
      if (token && token.length > 20) {
        Auth.save(token, email);
        Toast.ok('¡Tu cuenta ha sido creada exitosamente!');
        setTimeout(() => window.location.href = '../../index.html', 1000);
      } else {
        throw new Error('Token no recibido');
      }
    } catch (err) {
      Toast.err('Error en el registro. Quizá el correo ya está en uso');
      btn.disabled = false; btn.innerHTML = 'Crear mi cuenta';
    }
  }
</script>
</body>
</html>
