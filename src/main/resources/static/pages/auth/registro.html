<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Registro — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <link rel="stylesheet" href="../../css/cliente-theme.css"/>
  <link rel="stylesheet" href="../../css/auth-theme.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card auth-register">
    <div class="auth-brand">
      <div class="auth-icon-wrap"><i class="bi bi-person-heart"></i></div>
      <h1 class="h3 auth-title">Únete a nuestra familia</h1>
      <p class="auth-subtitle mb-0">Crea tu cuenta para pedidos rápidos y seguimiento personalizado.</p>
    </div>

    <form id="regForm" class="field auth-form">
      <div class="field">
        <label class="label">Nombres completos</label>
        <input type="text" id="f-nombre" class="form-control" required placeholder="Tus nombres" autocomplete="name">
      </div>

      <div class="field">
        <label class="label">Correo electrónico</label>
        <input type="email" id="f-email" class="form-control" required placeholder="tu@email.com" autocomplete="email">
      </div>

      <div class="row g-3">
        <div class="col-md-6 field">
          <label class="label">Contraseña</label>
          <input type="password" id="f-pwd" class="form-control" required placeholder="Mínimo 6 caracteres" autocomplete="new-password">
        </div>
        <div class="col-md-6 field">
          <label class="label">Celular (Opcional)</label>
          <input type="text" id="f-tel" class="form-control" placeholder="987654321" inputmode="numeric" maxlength="9">
        </div>
      </div>

      <button type="submit" id="btn-submit" class="btn btn-brand w-100 mt-1">Crear mi cuenta</button>

      <div class="auth-links">
        ¿Ya tienes cuenta? <a href="login.html" class="text-decoration-none">Ingresa aquí</a>
      </div>

      <div class="auth-back">
        <a href="../../index.html" class="btn btn-soft btn-sm"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/auth/registro.js"></script>
</body>
</html>
