<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Personaliza tu Pedido — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <link rel="stylesheet" href="../../css/cliente-theme.css"/>
  <style>
    .pers-card { transition: all 0.2s ease; border: 1px solid var(--border); }
    .pers-card:hover { border-color: var(--border-focus); transform: translateY(-2px); shadow: var(--shadow-sm); }
    .color-picker-wrap { position: relative; width: 45px; height: 45px; overflow: hidden; border-radius: 50%; border: 2px solid var(--border); }
    .color-picker-wrap input[type="color"] { position: absolute; right: -8px; top: -8px; width: 60px; height: 60px; border: none; cursor: pointer; }
    .img-preview { max-width: 100%; max-height: 200px; border-radius: var(--radius-sm); object-fit: cover; display: none; margin-top: 10px; border: 1px dashed var(--border); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top brand-navbar py-3 shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4"><i class="bi bi-shop me-2"></i>Casa Chantilly</a>
    <div class="d-flex align-items-center gap-3">
      <a href="perfil.html" class="btn btn-sm btn-outline-light"><i class="bi bi-person"></i> Ir a Perfil</a>
    </div>
  </div>
</nav>

<section class="py-4 py-md-5">
  <div class="container" style="max-width: 900px;">
    <div class="text-center mb-5">
      <h1 class="page-title fs-2 mb-2"><i class="bi bi-magic text-warning me-2"></i>Personaliza tu Pedido</h1>
      <p class="text-secondary mb-0">Agrega el texto, relleno, bizcocho y colores perfectos para cada producto de tu pedido <strong id="p-codigo">#Cargando...</strong>.</p>
    </div>

    <div id="loading-spinner" class="text-center py-5">
      <div class="spinner-border text-danger" role="status"></div>
      <p class="mt-3 text-secondary">Cargando detalles de tu compra...</p>
    </div>

    <div id="items-container" class="d-flex flex-column gap-4">
      <!-- Items renderizados dinámicamente -->
    </div>

    <div class="mt-5 text-center" id="finish-btn-wrap" style="display:none;">
      <a href="perfil.html" class="btn btn-brand btn-lg px-5 shadow-sm"><i class="bi bi-check2-circle me-2"></i> Terminar y ver progreso</a>
      <p class="text-secondary small mt-3"><i class="bi bi-info-circle"></i> Puedes volver a editar la personalización antes de que inicie la preparación.</p>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/core/config.js"></script>
<script src="../../js/core/storage.js"></script>
<script src="../../js/auth/session.js"></script>
<script src="../../js/components/toast.js"></script>
<script src="../../js/services/http.js"></script>
<script src="../../js/utils/format.js"></script>
<script src="../../js/app.js"></script>
<script src="../../js/cliente/personalizar.js"></script>
</body>
</html>
