<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chat de Pedido — La Casa del Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <link rel="stylesheet" href="../../css/cliente-theme.css"/>
  <style>
    .chat-container { display:flex; flex-direction:column; height:calc(100vh - var(--nav-h) - 120px); min-height:400px; }
    .chat-messages { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:0.5rem; }
    .chat-bubble { max-width:75%; padding:0.75rem 1rem; border-radius:var(--radius); }
    .chat-bubble.mine { align-self:flex-end; background:var(--grad); color:#fff; border-bottom-right-radius:4px; }
    .chat-bubble.theirs { align-self:flex-start; background:var(--bg-card); border:1px solid var(--border); border-bottom-left-radius:4px; }
    .chat-bubble .chat-meta { font-size:0.7rem; opacity:0.7; margin-top:4px; }
    .chat-input-bar { display:flex; gap:0.5rem; padding:1rem; border-top:1px solid var(--border); }
    .chat-input-bar input { flex:1; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top brand-navbar py-2 shadow-sm">
  <div class="container">
    <a href="/index.html" class="navbar-brand fw-bold fs-4"><i class="bi bi-shop me-2"></i>Casa Chantilly</a>
    <div class="d-flex gap-2">
      <a href="/pages/cliente/perfil.html" class="btn btn-sm btn-soft"><i class="bi bi-arrow-left"></i> Volver al perfil</a>
      <button id="nav-logout" class="btn btn-sm btn-soft" onclick="doLogout()"><i class="bi bi-box-arrow-right"></i> Salir</button>
    </div>
  </div>
</nav>

<section class="py-3">
  <div class="container">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center p-3">
        <div>
          <h5 class="mb-0"><i class="bi bi-chat-dots me-2"></i>Chat del Pedido <span id="chat-pedido-code"></span></h5>
          <small class="text-secondary">Comunícate con nuestro equipo sobre tu pedido</small>
        </div>
        <button class="btn btn-sm btn-outline-brand" onclick="loadMessages()"><i class="bi bi-arrow-clockwise"></i></button>
      </div>
      <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
          <p class="text-center text-secondary my-auto">Cargando mensajes...</p>
        </div>
        <div class="chat-input-bar">
          <input type="text" class="form-control" id="chat-input" placeholder="Escribe tu mensaje..." onkeydown="if(event.key==='Enter')sendMessage()"/>
          <button class="btn btn-brand" onclick="sendMessage()"><i class="bi bi-send"></i></button>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/app.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const pedidoId = params.get('pedidoId');
let pollInterval;

document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireClient()) return;
  if (!pedidoId) { window.location.href = '/pages/cliente/perfil.html'; return; }
  document.getElementById('chat-pedido-code').textContent = '#' + pedidoId;
  loadMessages();
  pollInterval = setInterval(loadMessages, 5000);
});

async function loadMessages() {
  try {
    const msgs = await API.get(`/api/chat/${pedidoId}`);
    const container = document.getElementById('chat-messages');
    if (!msgs || msgs.length === 0) {
      container.innerHTML = '<p class="text-center text-secondary my-auto">No hay mensajes aún. ¡Envía el primero!</p>';
      return;
    }
    const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 50;
    container.innerHTML = msgs.map(m => `
      <div class="chat-bubble ${m.esMio ? 'mine' : 'theirs'}">
        <div class="fw-semibold small">${m.esMio ? 'Tú' : m.nombreUsuario}</div>
        <div>${escapeHtml(m.mensaje)}</div>
        <div class="chat-meta">${fmt.dt(m.fecha)}</div>
      </div>
    `).join('');
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  } catch {}
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  try {
    await API.post(`/api/chat/${pedidoId}`, { mensaje: msg });
    loadMessages();
  } catch {}
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}
</script>
</body>
</html>
