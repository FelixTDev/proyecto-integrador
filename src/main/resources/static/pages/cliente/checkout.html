<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Checkout — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    .checkout-layout { display: grid; grid-template-columns: 1fr 360px; gap: 2rem; align-items: start; padding: 2rem 0 4rem; }
    @media(max-width:900px) { .checkout-layout { grid-template-columns: 1fr; } }
    .ch-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1.5rem; margin-bottom:1.25rem; }
    .item-line { display:flex; justify-content:space-between; padding:.4rem 0; font-size:.875rem; border-bottom:1px solid rgba(201,169,110,.07); }
    .item-line:last-child { border:none; }
    .sum-row { display:flex; justify-content:space-between; padding:.4rem 0; font-size:.9rem; color:var(--text-2); }
    .sum-total { font-size:1.25rem; font-weight:700; color:var(--gold); display:flex; justify-content:space-between; border-top:1px solid var(--border); padding-top:.85rem; margin-top:.5rem; }
    .radio-group { display:flex; gap:1rem; flex-wrap:wrap; }
    .radio-opt { display:flex; align-items:center; gap:.5rem; cursor:pointer; padding:.5rem .85rem; border:1px solid var(--border); border-radius:var(--radius); transition:all var(--fast); }
    .radio-opt:has(input:checked) { border-color:var(--gold); background:rgba(201,169,110,.07); color:var(--gold); }
    .radio-opt input { accent-color:var(--gold); }
    .secure { font-size:.75rem; color:var(--muted); text-align:center; margin-top:1rem; }
    .secure i { color:var(--green); }
  </style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="../../index.html" class="nav-brand">Casa Chantilly</a>
    <a href="carrito.html" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left"></i> Volver al carrito</a>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <h1 class="page-title"><i class="bi bi-credit-card" style="font-size:1.8rem;margin-right:.5rem"></i>Checkout</h1>
  </div>

  <div class="alert alert-err" id="err"></div>
  <div class="alert alert-ok"  id="ok"></div>

  <div class="checkout-layout">
    <!-- Formularios -->
    <div>
      <!-- Entrega -->
      <div class="ch-card">
        <div class="step-title"><span class="step-num">1</span> Tipo de entrega</div>
        <div class="radio-group">
          <label class="radio-opt"><input type="radio" name="tipo" value="delivery" checked> <i class="bi bi-truck"></i> Delivery</label>
          <label class="radio-opt"><input type="radio" name="tipo" value="recojo">   <i class="bi bi-shop"></i>  Recoger en tienda</label>
        </div>
        <div id="dir-section" class="mt-2">
          <div class="field mt-2">
            <label class="label">Dirección de entrega</label>
            <input type="text" class="input" id="direccion" placeholder="Av. Principal 123, Miraflores, Lima"/>
          </div>
        </div>
      </div>

      <!-- Pago -->
      <div class="ch-card">
        <div class="step-title"><span class="step-num">2</span> Método de pago</div>
        <div class="field">
          <label class="label">Selecciona cómo pagar</label>
          <select class="select" id="metodo-pago" onchange="toggleCard()">
            <option value="1">💳 Tarjeta de crédito / débito</option>
            <option value="2">📱 Yape</option>
            <option value="3">📱 Plin</option>
            <option value="4">💵 Efectivo contra entrega</option>
          </select>
        </div>
        <div id="card-section" class="mt-2">
          <div class="grid-2 mt-2">
            <div class="field" style="grid-column:1/-1">
              <label class="label">Número de tarjeta</label>
              <input type="text" class="input" id="card-num" placeholder="4111 1111 1111 1111" maxlength="19"/>
            </div>
            <div class="field">
              <label class="label">Expiración</label>
              <input type="text" class="input" id="card-exp" placeholder="MM/YY" maxlength="5"/>
            </div>
            <div class="field">
              <label class="label">CVV</label>
              <input type="text" class="input" id="card-cvv" placeholder="123" maxlength="4"/>
            </div>
          </div>
        </div>
        <div class="field mt-2">
          <label class="label">Email para recibo</label>
          <input type="email" class="input" id="email-pago" placeholder="tu@correo.com"/>
        </div>
        <p class="secure"><i class="bi bi-shield-check"></i> Pago procesado de forma segura con Culqi</p>
      </div>
    </div>

    <!-- Resumen -->
    <div>
      <div class="ch-card" style="position:sticky;top:calc(var(--nav-h)+1rem)">
        <h6 style="font-family:var(--font-display);font-size:1.1rem;margin-bottom:1.1rem">Tu pedido</h6>
        <div id="items-list"><p style="color:var(--muted);font-size:.875rem">Cargando…</p></div>
        <div class="mt-3">
          <div class="sum-row"><span>Subtotal</span><span id="c-sub">S/ 0.00</span></div>
          <div class="sum-row"><span>IGV (18%)</span><span id="c-igv">S/ 0.00</span></div>
          <div class="sum-total"><span>Total a pagar</span><span id="c-total">S/ 0.00</span></div>
        </div>
        <button class="btn btn-gold btn-full btn-lg mt-3" id="btn-pagar" onclick="procesarPago()">
          <span id="pay-text"><i class="bi bi-lock"></i> Pagar ahora</span>
          <span id="pay-spin" style="display:none"><i class="bi bi-arrow-repeat spin"></i> Procesando…</span>
        </button>
      </div>
    </div>
  </div>
</main>

<script src="../../js/app.js"></script>
<script>
  let carritoData = null;

  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.requireLogin()) return;
    document.getElementById('email-pago').value = Auth.email() || '';
    try {
      const j = await API.get('/api/carrito');
      carritoData = j.data;
      renderSummary(carritoData);
    } catch { Toast.err('Error al cargar el carrito'); }
  });

  // Toggle delivery/recojo
  document.querySelectorAll('input[name="tipo"]').forEach(r =>
    r.addEventListener('change', () => {
      document.getElementById('dir-section').style.display = r.value === 'delivery' ? 'block' : 'none';
    })
  );

  function toggleCard() {
    document.getElementById('card-section').style.display =
      document.getElementById('metodo-pago').value === '1' ? 'block' : 'none';
  }

  // Format card number
  document.getElementById('card-num')?.addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g,'').substring(0,16);
    e.target.value = v.replace(/(.{4})/g,'$1 ').trim();
  });

  function renderSummary(cart) {
    if (!cart?.items?.length) {
      document.getElementById('items-list').innerHTML = '<p style="color:var(--muted);font-size:.875rem">Carrito vacío</p>';
      document.getElementById('btn-pagar').disabled = true; return;
    }
    document.getElementById('items-list').innerHTML =
      cart.items.map(it =>
        `<div class="item-line"><span>${it.productoNombre} × ${it.cantidad}</span><span style="color:var(--gold)">${fmt.money(it.subtotal)}</span></div>`
      ).join('');
    document.getElementById('c-sub').textContent   = fmt.money(cart.subtotal);
    document.getElementById('c-igv').textContent   = fmt.money(cart.igv);
    document.getElementById('c-total').textContent = fmt.money(cart.total);
  }

  async function procesarPago() {
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.classList.remove('show'); ok.classList.remove('show');

    if (!carritoData?.items?.length) { err.textContent='Carrito vacío'; err.classList.add('show'); return; }

    const cardNum = document.getElementById('card-num').value.replace(/\s/g,'');
    const tokenTarjeta = 'tkn_test_' + cardNum.substring(0,4) + '_' + Date.now();
    const esRecojo = document.querySelector('input[name="tipo"]:checked').value === 'recojo';

    document.getElementById('pay-text').style.display = 'none';
    document.getElementById('pay-spin').style.display = 'inline-flex';
    document.getElementById('btn-pagar').disabled = true;

    try {
      const j = await API.post('/api/pagos/procesar', {
        carritoId: carritoData.id,
        tokenTarjeta,
        esRecojoTienda: esRecojo,
        email: document.getElementById('email-pago').value || null,
        metodoPagoId: parseInt(document.getElementById('metodo-pago').value),
        direccionId: null, franjaHorariaId: null
      });
      if (j.data?.aprobado) {
        ok.innerHTML = `<i class="bi bi-check-circle-fill"></i> ${j.data.mensaje} — Pedido #${j.data.pedidoId}`;
        ok.classList.add('show');
        document.getElementById('btn-pagar').style.display = 'none';
        document.getElementById('items-list').innerHTML = '<p style="color:var(--green)"><i class="bi bi-check-circle"></i> ¡Pedido confirmado!</p>';
      } else {
        err.textContent = j.data?.mensaje || j.message || 'Pago rechazado';
        err.classList.add('show');
        document.getElementById('btn-pagar').disabled = false;
      }
    } catch {
      err.textContent = 'Error de conexión con la pasarela'; err.classList.add('show');
      document.getElementById('btn-pagar').disabled = false;
    } finally {
      document.getElementById('pay-text').style.display = 'inline-flex';
      document.getElementById('pay-spin').style.display = 'none';
    }
  }
</script>
</body>
</html>
