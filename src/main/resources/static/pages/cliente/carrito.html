<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mi Carrito — La Casa del Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    .cart-grid {
      display: grid; grid-template-columns: 1fr 340px; gap: 2rem;
      align-items: start; margin-top: 1rem;
    }
    .cart-items {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
    }
    .cart-item {
      display: flex; gap: 1rem; align-items: stretch;
      padding: 1.25rem 0; border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; padding-bottom: 0; }
    .cart-item:first-child { padding-top: 0; }
    .ci-img {
      width: 100px; height: 100px;
      object-fit: cover; border-radius: var(--radius-sm);
      background: var(--bg-3);
    }
    .ci-details { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .ci-title { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; color: var(--white); }
    .ci-var { color: var(--gold); font-size: 0.85rem; font-weight: 500; }
    .ci-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; }
    .qty-ctl {
      display: inline-flex; align-items: center; border: 1px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden; background: var(--bg-input);
    }
    .qty-btn { background: transparent; color: var(--white); border: none; padding: 0.35rem 0.65rem; transition: background var(--fast); }
    .qty-btn:hover { background: rgba(245,197,24,0.1); color: var(--gold); }
    .qty-val { width: 40px; text-align: center; font-size: 0.9rem; font-weight: 600; border: none; background: transparent; color: var(--white); }
    .ci-price { font-weight: 600; font-size: 1.1rem; }
    
    .cart-summary {
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
      position: sticky; top: calc(var(--nav-h) + 2rem);
    }
    .sum-row { display: flex; justify-content: space-between; margin-bottom: 0.75rem; color: var(--text-2); font-size: 0.95rem; }
    .sum-total { display: flex; justify-content: space-between; margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); font-size: 1.4rem; font-weight: 600; color: var(--white); font-family: var(--font-display); }
    
    @media (max-width: 900px) {
      .cart-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 500px) {
      .cart-item { flex-direction: column; }
      .ci-img { width: 100%; height: 160px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../../index.html" class="nav-brand"><i class="bi bi-shop"></i> Casa Chantilly</a>
    <div class="nav-links">
      <a href="../admin/dashboard.html" id="nav-admin" class="btn btn-ghost btn-sm" style="display:none"><i class="bi bi-shield-lock"></i> Panel</a>
      <a href="carrito.html" class="btn btn-outline btn-sm"><i class="bi bi-cart3"></i> Carrito</a>
      <a href="perfil.html" id="nav-perfil" class="btn btn-ghost btn-sm"><i class="bi bi-person-circle"></i> Mi Perfil</a>
      <button id="nav-logout" class="btn btn-ghost btn-sm" onclick="doLogout()"><i class="bi bi-box-arrow-right"></i> Salir</button>
    </div>
  </div>
</nav>

<div class="container section">
  <div class="page-header">
    <h1 class="page-title"><i class="bi bi-cart3" style="font-size:1.8rem;margin-right:0.5rem;color:var(--gold)"></i>Mi Carrito</h1>
    <p class="page-sub">Revisa tus productos elegidos antes de finalizar el pedido.</p>
  </div>

  <div id="cart-content" style="min-height:300px">
    <div class="spin" style="margin:4rem auto;display:block;text-align:center;font-size:2rem;color:var(--gold)"><i class="bi bi-arrow-repeat"></i></div>
  </div>
</div>

<script src="../../js/app.js"></script>
<script>
  Auth.requireLogin();
  let cartData = null;

  async function loadCart() {
    const root = document.getElementById('cart-content');
    try {
      const res = await API.get('/api/carrito');
      cartData = res;
      renderCart(root);
    } catch (e) {
      root.innerHTML = `<div class="empty"><i class="bi bi-exclamation-triangle"></i><p>No se pudo cargar tu carrito. ${e.message}</p></div>`;
    }
  }

  function renderCart(root) {
    if (!cartData || !cartData.items || cartData.items.length === 0) {
      root.innerHTML = `
        <div class="empty">
          <i class="bi bi-cart-x"></i>
          <h3 style="color:var(--white);font-family:var(--font-display);font-size:1.8rem;margin-bottom:0.5rem">Tu carrito está vacío</h3>
          <p style="margin-bottom:1.5rem">Anímate a explorar nuestras delicias frescas.</p>
          <a href="../../index.html" class="btn btn-primary">Ver Catálogo</a>
        </div>
      `;
      return;
    }

    const itemsHtml = cartData.items.map(item => `
      <div class="cart-item">
        <img src="${item.urlFoto || 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=200&q=80'}" class="ci-img" alt="${item.productoNombre}">
        <div class="ci-details">
          <div>
            <div class="flex-between">
              <h4 class="ci-title">${item.productoNombre}</h4>
              <button class="btn btn-ghost btn-sm" style="color:var(--red);padding:0.2rem" onclick="removeItem(${item.detalleId})" title="Eliminar"><i class="bi bi-trash3"></i></button>
            </div>
            <p class="ci-var">Porción: ${item.varianteNombre}</p>
          </div>
          <div class="ci-controls">
            <div class="qty-ctl">
              <button class="qty-btn" onclick="updateQty(${item.detalleId}, ${item.cantidad - 1})"><i class="bi bi-dash"></i></button>
              <input type="text" class="qty-val" value="${item.cantidad}" readonly>
              <button class="qty-btn" onclick="updateQty(${item.detalleId}, ${item.cantidad + 1})"><i class="bi bi-plus"></i></button>
            </div>
            <div class="ci-price">${fmt.money(item.subtotal)}</div>
          </div>
        </div>
      </div>
    `).join('');

    root.innerHTML = `
      <div class="cart-grid">
        <div class="cart-items">
          <div class="flex-between" style="margin-bottom:1.25rem;border-bottom:1px solid var(--border);padding-bottom:1rem">
            <h3 style="color:var(--white);font-family:var(--font-display);font-size:1.4rem">Tus Productos</h3>
            <button class="btn btn-danger btn-sm" onclick="clearCart()"><i class="bi bi-trash2"></i> Vaciar todo</button>
          </div>
          ${itemsHtml}
        </div>
        <div class="cart-summary">
          <h3 style="color:var(--white);font-family:var(--font-display);font-size:1.4rem;margin-bottom:1.5rem">Resumen del pedido</h3>
          <div class="sum-row"><span>Subtotal</span><span>${fmt.money(cartData.subtotal)}</span></div>
          <div class="sum-row"><span>IGV (18%)</span><span>${fmt.money(cartData.igv)}</span></div>
          <div class="sum-total"><span>Total</span><span>${fmt.money(cartData.total || (cartData.subtotal * 1.18))}</span></div>
          
          <div class="divider"></div>
          <a href="checkout.html" class="btn btn-primary btn-full btn-lg">Proceder al Pago <i class="bi bi-credit-card"></i></a>
          <p style="text-align:center;font-size:0.75rem;color:var(--muted);margin-top:1rem"><i class="bi bi-shield-check" style="color:var(--green)"></i> Pago Seguro y Encriptado</p>
        </div>
      </div>
    `;
  }

  async function updateQty(id, qty) {
    if (qty < 1) return removeItem(id);
    try {
      await API.put(`/api/carrito/items/${id}`, { cantidad: qty });
      loadCart();
    } catch (e) { Toast.err('No hay suficiente stock o error: ' + e.message); }
  }

  async function removeItem(id) {
    if (!confirm('¿Quitar este pastel del carrito?')) return;
    try {
      await API.delete(`/api/carrito/items/${id}`);
      Toast.info('Producto retirado');
      loadCart();
    } catch (e) {}
  }

  async function clearCart() {
    if (!confirm('¿Estás seguro de vaciar todo el carrito?')) return;
    try {
      await API.delete('/api/carrito');
      loadCart();
    } catch {}
  }

  document.addEventListener('DOMContentLoaded', loadCart);
</script>
</body>
</html>
