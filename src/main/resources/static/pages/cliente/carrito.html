<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mi Carrito — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 340px; gap: 2rem; align-items: start; padding: 2rem 0 4rem; }
    @media(max-width:900px) { .cart-layout { grid-template-columns: 1fr; } }

    .qty-ctrl { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn {
      width: 30px; height: 30px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text); cursor: pointer; transition: all var(--fast);
      display: flex; align-items: center; justify-content: center; font-size: 0.9rem;
    }
    .qty-btn:hover { background: var(--gold); border-color: var(--gold); color: #000; }
    .qty-btn:disabled { opacity: 0.3; pointer-events: none; }
    .qty-val { min-width: 28px; text-align: center; font-weight: 600; }

    .item-name { font-weight: 600; font-size: 0.9rem; }
    .item-var  { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .item-price { color: var(--gold); font-weight: 700; }

    .del-btn { background:none; border:none; color:var(--muted); font-size:1.05rem; cursor:pointer; transition:color var(--fast); padding:.25rem; }
    .del-btn:hover { color: var(--red); }

    .summary { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; position: sticky; top: calc(var(--nav-h) + 1rem); }
    .sum-row { display: flex; justify-content: space-between; padding: 0.4rem 0; font-size: 0.9rem; color: var(--text-2); }
    .sum-total { font-size: 1.2rem; font-weight: 700; color: var(--gold); border-top: 1px solid var(--border); padding-top: 0.85rem; margin-top: 0.5rem; display: flex; justify-content: space-between; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="../../index.html" class="nav-brand">Casa Chantilly</a>
    <div class="nav-links">
      <a href="../../index.html" class="btn btn-ghost btn-sm"><i class="bi bi-arrow-left"></i> Catálogo</a>
      <span id="nav-user" style="font-size:.8rem;color:var(--muted);padding:0 .5rem"></span>
      <button id="nav-logout" class="btn btn-ghost btn-sm" onclick="doLogout()" style="display:none"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <h1 class="page-title"><i class="bi bi-cart3" style="font-size:1.8rem;margin-right:.5rem"></i>Mi Carrito</h1>
  </div>

  <!-- Auth wall -->
  <div id="auth-wall" style="display:none">
    <div class="empty">
      <i class="bi bi-lock"></i>
      <p>Debes iniciar sesión para ver tu carrito</p>
      <a href="../auth/login.html" class="btn btn-gold mt-2">Iniciar Sesión</a>
    </div>
  </div>

  <!-- Cart content -->
  <div id="cart-content" style="display:none">
    <div class="cart-layout">
      <!-- Tabla -->
      <div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Precio unit.</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cart-body"></tbody>
          </table>
        </div>
        <div id="empty-msg" class="empty" style="display:none">
          <i class="bi bi-cart-x"></i>
          <p>Tu carrito está vacío</p>
          <a href="../../index.html" class="btn btn-gold mt-2">Explorar catálogo</a>
        </div>
        <div id="cart-actions" style="display:none; margin-top:1rem; text-align:right">
          <button class="btn btn-danger btn-sm" onclick="vaciar()">
            <i class="bi bi-trash3"></i> Vaciar carrito
          </button>
        </div>
      </div>

      <!-- Resumen -->
      <div class="summary" id="summary" style="display:none">
        <h6 style="font-family:var(--font-display);font-size:1.1rem;margin-bottom:1.1rem">Resumen del pedido</h6>
        <div class="sum-row"><span>Subtotal</span><span id="s-sub">S/ 0.00</span></div>
        <div class="sum-row"><span>IGV (18%)</span><span id="s-igv">S/ 0.00</span></div>
        <div class="sum-total"><span>Total</span><span id="s-total">S/ 0.00</span></div>
        <a href="checkout.html" class="btn btn-gold btn-full btn-lg mt-3">
          <i class="bi bi-credit-card"></i> Proceder al pago
        </a>
        <a href="../../index.html" class="btn btn-outline btn-full mt-2">Seguir comprando</a>
      </div>
    </div>
  </div>
</main>

<script src="../../js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!Auth.isLoggedIn()) {
      document.getElementById('auth-wall').style.display = 'block';
      return;
    }
    document.getElementById('cart-content').style.display = 'block';
    loadCart();
  });

  async function loadCart() {
    try {
      const j = await API.get('/api/carrito');
      if (j.success) renderCart(j.data);
      else if (j.status === 401) { document.getElementById('auth-wall').style.display = 'block'; document.getElementById('cart-content').style.display = 'none'; }
    } catch { Toast.err('Error al cargar el carrito'); }
  }

  function renderCart(cart) {
    const body    = document.getElementById('cart-body');
    const emptyEl = document.getElementById('empty-msg');
    const summary = document.getElementById('summary');
    const actions = document.getElementById('cart-actions');

    if (!cart?.items?.length) {
      body.innerHTML = ''; emptyEl.style.display = 'block';
      summary.style.display = 'none'; actions.style.display = 'none';
      return;
    }
    emptyEl.style.display = 'none'; summary.style.display = 'block'; actions.style.display = 'block';

    body.innerHTML = cart.items.map(it => `
      <tr>
        <td><div class="item-name">${it.productoNombre}</div><div class="item-var">${it.varianteNombre}</div></td>
        <td class="item-price">${fmt.money(it.precioUnitario)}</td>
        <td>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="updateQty(${it.detalleId},${it.cantidad-1})"><i class="bi bi-dash"></i></button>
            <span class="qty-val">${it.cantidad}</span>
            <button class="qty-btn" onclick="updateQty(${it.detalleId},${it.cantidad+1})" ${it.cantidad>=it.stockDisponible?'disabled':''}><i class="bi bi-plus"></i></button>
          </div>
        </td>
        <td class="item-price">${fmt.money(it.subtotal)}</td>
        <td><button class="del-btn" onclick="removeItem(${it.detalleId})"><i class="bi bi-trash3"></i></button></td>
      </tr>`).join('');

    document.getElementById('s-sub').textContent   = fmt.money(cart.subtotal);
    document.getElementById('s-igv').textContent   = fmt.money(cart.igv);
    document.getElementById('s-total').textContent = fmt.money(cart.total);
  }

  async function updateQty(id, qty) {
    if (qty <= 0) return removeItem(id);
    try {
      const j = await API.put(`/api/carrito/items/${id}`, { cantidad: qty });
      if (j.success) renderCart(j.data);
      else Toast.err(j.message);
    } catch { Toast.err('Error al actualizar cantidad'); }
  }

  async function removeItem(id) {
    try {
      const j = await API.delete(`/api/carrito/items/${id}`);
      if (j.success) { renderCart(j.data); Toast.ok('Ítem eliminado'); }
    } catch { Toast.err('Error al eliminar'); }
  }

  async function vaciar() {
    if (!confirm('¿Vaciar todo el carrito?')) return;
    try { await API.delete('/api/carrito'); loadCart(); } catch {}
  }
</script>
</body>
</html>
