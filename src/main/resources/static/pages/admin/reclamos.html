<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reclamos — Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../../css/variables.css"/>
  <link rel="stylesheet" href="../../css/base.css"/>
  <link rel="stylesheet" href="../../css/admin-theme.css"/>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top brand-navbar py-2 shadow-sm">
  <div class="container-fluid px-4">
    <a href="/pages/admin/dashboard.html" class="navbar-brand fw-bold"><i class="bi bi-shield-lock me-2"></i>Admin Panel</a>
    <div class="d-flex gap-2 align-items-center">
      <a href="/pages/admin/dashboard.html" class="btn btn-sm btn-soft">Dashboard</a>
      <a href="/pages/admin/pedidos.html" class="btn btn-sm btn-soft">Pedidos</a>
      <a href="/pages/admin/productos.html" class="btn btn-sm btn-soft">Productos</a>
      <a href="/pages/admin/promociones.html" class="btn btn-sm btn-soft">Promos</a>
      <a href="/pages/admin/reclamos.html" class="btn btn-sm btn-gold">Reclamos</a>
      <a href="/index.html" class="btn btn-sm btn-outline-light"><i class="bi bi-house"></i></a>
      <button class="btn btn-sm btn-soft" onclick="doLogout()"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </div>
</nav>

<section class="py-4">
  <div class="container-fluid px-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div>
        <h1 class="page-title mb-1">Gestión de Reclamos</h1>
        <p class="text-secondary mb-0">Administra y resuelve reclamos de clientes</p>
      </div>
      <div class="d-flex gap-2">
        <select class="form-select form-select-sm" id="filtro-estado" onchange="loadReclamos()" style="width:auto">
          <option value="">Todos</option>
          <option value="ABIERTO">Abierto</option>
          <option value="EN_REVISION">En revisión</option>
          <option value="RESUELTO">Resuelto</option>
          <option value="CERRADO">Cerrado</option>
        </select>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>#</th><th>Pedido</th><th>Cliente</th><th>Tipo</th><th>Estado</th><th>Prioridad</th><th>Fecha</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="reclamos-tbody"></tbody>
      </table>
    </div>
  </div>
</section>

<div class="modal-backdrop" id="modal-reclamo">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <h3 class="modal-title">Gestionar Reclamo</h3>
      <button class="modal-close" onclick="Modal.close('modal-reclamo')"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div id="reclamo-detail"></div>
      <hr/>
      <h5 class="h6">Actualizar estado</h5>
      <input type="hidden" id="reclamo-id"/>
      <div class="row g-3">
        <div class="col-md-6 field">
          <label class="label">Nuevo estado</label>
          <select class="form-select" id="reclamo-nuevo-estado">
            <option value="ABIERTO">Abierto</option>
            <option value="EN_REVISION">En revisión</option>
            <option value="RESUELTO">Resuelto</option>
            <option value="CERRADO">Cerrado</option>
          </select>
        </div>
        <div class="col-md-6 field">
          <label class="label">Monto reembolso</label>
          <input type="number" step="0.01" class="form-control" id="reclamo-reembolso" placeholder="0.00"/>
        </div>
      </div>
      <div class="field mt-3">
        <label class="label">Detalle de resolución</label>
        <textarea class="form-control" id="reclamo-resolucion" rows="3"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline-brand" onclick="Modal.close('modal-reclamo')">Cancelar</button>
      <button class="btn btn-brand" onclick="actualizarReclamo()">Guardar cambios</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../js/core/config.js"></script>
<script src="../../js/core/storage.js"></script>
<script src="../../js/auth/session.js"></script>
<script src="../../js/components/toast.js"></script>
<script src="../../js/services/http.js"></script>
<script src="../../js/utils/format.js"></script>
<script src="../../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!Auth.requireAdmin()) return;
  loadReclamos();
});

let allReclamos = [];

async function loadReclamos() {
  try {
    allReclamos = await API.get('/api/admin/reclamos');
    renderReclamos();
  } catch {}
}

function renderReclamos() {
  const filtro = document.getElementById('filtro-estado').value;
  const filtered = filtro ? allReclamos.filter(r => r.estado === filtro) : allReclamos;
  const tbody = document.getElementById('reclamos-tbody');

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-secondary py-4">No hay reclamos</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td><strong>#${r.id}</strong></td>
      <td>${r.codigoPedido || '#'+r.pedidoId}</td>
      <td>${r.nombreCliente}</td>
      <td><span class="badge bg-secondary">${r.tipo}</span></td>
      <td><span class="badge ${reclamoBadge(r.estado)}">${r.estado}</span></td>
      <td><span class="badge ${prioridadBadge(r.prioridad)}">${r.prioridad}</span></td>
      <td>${fmt.date(r.fechaCreacion)}</td>
      <td>
        <button class="btn btn-sm btn-outline-brand" onclick="abrirReclamo(${r.id})"><i class="bi bi-pencil"></i></button>
        <a href="/pages/cliente/chat.html?pedidoId=${r.pedidoId}" class="btn btn-sm btn-outline-secondary" target="_blank"><i class="bi bi-chat"></i></a>
      </td>
    </tr>
  `).join('');
}

function reclamoBadge(e) {
  return {ABIERTO:'bg-warning text-dark',EN_REVISION:'bg-info',RESUELTO:'bg-success',CERRADO:'bg-secondary'}[e]||'bg-secondary';
}
function prioridadBadge(p) {
  return {BAJA:'bg-success',MEDIA:'bg-warning text-dark',ALTA:'bg-danger'}[p]||'bg-secondary';
}

function abrirReclamo(id) {
  const r = allReclamos.find(x => x.id === id);
  if (!r) return;
  document.getElementById('reclamo-id').value = r.id;
  document.getElementById('reclamo-nuevo-estado').value = r.estado;
  document.getElementById('reclamo-reembolso').value = r.montoReembolso || '';
  document.getElementById('reclamo-resolucion').value = r.detalleResolucion || '';
  document.getElementById('reclamo-detail').innerHTML = `
    <p><strong>Cliente:</strong> ${r.nombreCliente}<br>
    <strong>Pedido:</strong> ${r.codigoPedido || '#'+r.pedidoId}<br>
    <strong>Tipo:</strong> ${r.tipo}<br>
    <strong>Fecha:</strong> ${fmt.dt(r.fechaCreacion)}</p>
    <p class="text-secondary">${r.descripcion}</p>
  `;
  Modal.open('modal-reclamo');
}

async function actualizarReclamo() {
  const id = document.getElementById('reclamo-id').value;
  const body = {
    estado: document.getElementById('reclamo-nuevo-estado').value,
    montoReembolso: parseFloat(document.getElementById('reclamo-reembolso').value) || 0,
    detalleResolucion: document.getElementById('reclamo-resolucion').value
  };
  try {
    await API.patch(`/api/admin/reclamos/${id}`, body);
    Toast.ok('Reclamo actualizado');
    Modal.close('modal-reclamo');
    loadReclamos();
  } catch {}
}
</script>
</body>
</html>
