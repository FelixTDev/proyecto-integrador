<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Iniciar Sesión — Casa Chantilly</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--primary:#c9a96e;--accent:#d4856a;--bg:#0f0a08;--text:#f5f0e8;--muted:#9a8a7e;--border:rgba(201,169,110,.15);--gradient:linear-gradient(135deg,#c9a96e,#d4856a)}
    *{box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .auth-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:24px;padding:2.5rem;width:100%;max-width:440px;position:relative;overflow:hidden}
    .auth-card::before{content:'';position:absolute;top:-60%;left:-60%;width:250%;height:250%;background:radial-gradient(circle,rgba(201,169,110,.04),transparent 50%);pointer-events:none}
    .auth-title{font-family:'Playfair Display',serif;font-size:1.8rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem;text-align:center}
    .auth-sub{color:var(--muted);text-align:center;margin-bottom:2rem;font-size:.9rem}
    .form-label{color:var(--muted);font-size:.82rem;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
    .form-control{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:.7rem 1rem}
    .form-control:focus{background:rgba(255,255,255,.07);border-color:var(--primary);box-shadow:0 0 0 3px rgba(201,169,110,.15);color:var(--text)}
    .btn-gold{background:var(--gradient);border:none;color:#fff;font-weight:600;border-radius:12px;padding:.75rem;width:100%;font-size:1rem;transition:all .3s}
    .btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,169,110,.35);color:#fff}
    .link{color:var(--primary);text-decoration:none;font-weight:500}.link:hover{color:var(--accent)}
    .alert-err{background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.2);color:#ff6b6b;border-radius:12px;padding:.7rem 1rem;font-size:.85rem;display:none}
    .nav-brand{font-family:'Playfair Display',serif;font-size:1.4rem;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;text-align:center;display:block;margin-bottom:1.5rem}
  </style>
</head>
<body>
  <div class="auth-card">
    <a href="/" class="nav-brand">Casa Chantilly</a>
    <h1 class="auth-title">Bienvenido de vuelta</h1>
    <p class="auth-sub">Inicia sesión para acceder a tu cuenta</p>
    <div class="alert-err" id="error"></div>
    <form id="loginForm" onsubmit="return doLogin(event)">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required placeholder="tu@email.com"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <div class="position-relative">
          <input type="password" class="form-control" id="password" required placeholder="••••••••"/>
          <button type="button" class="position-absolute top-50 end-0 translate-middle-y border-0 bg-transparent me-2" style="color:var(--muted)" onclick="togglePw()">
            <i class="bi bi-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-gold mt-2" id="btnLogin">
        <span id="btnText">Iniciar Sesión</span>
        <span id="btnSpinner" style="display:none"><i class="bi bi-arrow-repeat spin"></i> Procesando…</span>
      </button>
    </form>
    <p class="text-center mt-3" style="font-size:.88rem;color:var(--muted)">
      ¿No tienes cuenta? <a href="/registro.html" class="link">Regístrate aquí</a>
    </p>
  </div>
  <style>.spin{animation:spin 1s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}</style>
  <script>
    function togglePw(){const p=document.getElementById('password');const i=document.getElementById('pwIcon');if(p.type==='password'){p.type='text';i.className='bi bi-eye-slash'}else{p.type='password';i.className='bi bi-eye'}}
    async function doLogin(e){
      e.preventDefault();
      const err=document.getElementById('error');err.style.display='none';
      document.getElementById('btnText').style.display='none';
      document.getElementById('btnSpinner').style.display='inline';
      try{
        const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
        const json=await res.json();
        if(!res.ok||!json.success){err.textContent=json.message||'Credenciales inválidas';err.style.display='block';return}
        localStorage.setItem('jwt',json.data.token);localStorage.setItem('email',json.data.email);
        window.location.href='/';
      }catch(ex){err.textContent='Error de conexión';err.style.display='block'}
      finally{document.getElementById('btnText').style.display='inline';document.getElementById('btnSpinner').style.display='none'}
    }
  </script>
</body>
</html>
