<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>La Casa del Chantilly — Pastelería Artesanal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/base.css"/>
  <style>
    /* Hero */
    .hero {
      position: relative;
      background: var(--bg-2);
      padding: 5rem 1.5rem;
      text-align: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(204,32,32,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 1rem;
      position: relative;
    }
    .hero-title span { color: var(--gold); }
    .hero-subtitle {
      color: var(--text-2);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 2rem;
      position: relative;
    }
    /* Catálogo Controls */
    .cat-controls {
      display: flex; gap: 1rem; margin-bottom: 2rem;
      flex-wrap: wrap; align-items: center; justify-content: space-between;
    }
    .cat-filters {
      display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;
    }
    .cat-filters .btn { border-radius: 99px; }
    
    /* Product Card */
    .product-img-wrapper {
      position: relative; padding-top: 80%;
      background: var(--bg-3); border-radius: 8px; margin-bottom: 1rem;
      overflow: hidden;
    }
    .product-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
    }
    .product-title {
      font-family: var(--font-display);
      font-size: 1.25rem; font-weight: 600;
      color: var(--white); margin-bottom: 0.25rem;
    }
    .product-desc {
      font-size: 0.85rem; color: var(--muted);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 1rem; min-height: 2.7em;
    }
    .product-price { color: var(--gold); font-size: 1.25rem; font-weight: 600; }
    
    /* Modal Variants */
    .var-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .var-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 1rem; border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: all var(--fast); background: var(--bg-input);
    }
    .var-item:hover { border-color: var(--gold); background: rgba(245,197,24,0.05); }
    .var-item.selected { border-color: var(--gold); background: rgba(245,197,24,0.1); }
    .var-item-name { font-weight: 500; color: var(--white); }
    .var-item-price { color: var(--gold); }
    
    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 0.5rem; margin-top: 3rem; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand"><i class="bi bi-shop"></i> Casa Chantilly</a>
    <div class="nav-links">
      <a href="pages/admin/dashboard.html" id="nav-admin" class="btn btn-ghost btn-sm" style="display:none"><i class="bi bi-shield-lock"></i> Panel</a>
      <a href="pages/cliente/carrito.html" class="btn btn-ghost btn-sm"><i class="bi bi-cart3"></i> Carrito</a>
      <a href="pages/cliente/perfil.html" id="nav-perfil" class="btn btn-ghost btn-sm" style="display:none"><i class="bi bi-person-circle"></i> <span id="nav-user"></span></a>
      <a href="pages/auth/login.html" id="nav-login" class="btn btn-primary btn-sm"><i class="bi bi-box-arrow-in-right"></i> Ingresar</a>
      <button id="nav-logout" class="btn btn-ghost btn-sm" onclick="doLogout()" style="display:none"><i class="bi bi-box-arrow-right"></i> Salir</button>
    </div>
  </div>
</nav>

<section class="hero">
  <h1 class="hero-title">El arte del pastel <span>hecho con amor</span></h1>
  <p class="hero-subtitle">Descubre nuestra exquisita selección de pastelería artesanal, elaborada diariamente con la frescura y calidad que nos caracteriza en La Casa del Chantilly.</p>
  <a href="#catalogo" class="btn btn-gold btn-lg">Ver Catálogo <i class="bi bi-arrow-down"></i></a>
</section>

<div class="container section" id="catalogo">
  <div class="cat-controls">
    <div class="cat-filters" id="cat-filters">
      <!-- Botones de categoría inyectados vía JS -->
    </div>
    <div style="color:var(--muted-light);font-size:0.85rem;" id="cat-counts"></div>
  </div>

  <div class="grid-4" id="grid-productos">
    <!-- Skeleton Loaders de inicio -->
    <div class="card"><div class="skeleton" style="height:180px;margin-bottom:1rem;border-radius:8px"></div><div class="skeleton" style="height:24px;width:70%;margin-bottom:.5rem"></div><div class="skeleton" style="height:16px;width:100%;margin-bottom:.2rem"></div><div class="skeleton" style="height:16px;width:80%"></div></div>
    <div class="card"><div class="skeleton" style="height:180px;margin-bottom:1rem;border-radius:8px"></div><div class="skeleton" style="height:24px;width:70%;margin-bottom:.5rem"></div><div class="skeleton" style="height:16px;width:100%;margin-bottom:.2rem"></div><div class="skeleton" style="height:16px;width:80%"></div></div>
    <div class="card"><div class="skeleton" style="height:180px;margin-bottom:1rem;border-radius:8px"></div><div class="skeleton" style="height:24px;width:70%;margin-bottom:.5rem"></div><div class="skeleton" style="height:16px;width:100%;margin-bottom:.2rem"></div><div class="skeleton" style="height:16px;width:80%"></div></div>
    <div class="card"><div class="skeleton" style="height:180px;margin-bottom:1rem;border-radius:8px"></div><div class="skeleton" style="height:24px;width:70%;margin-bottom:.5rem"></div><div class="skeleton" style="height:16px;width:100%;margin-bottom:.2rem"></div><div class="skeleton" style="height:16px;width:80%"></div></div>
  </div>

  <div class="pagination" id="pagination">
    <!-- Paginación JS -->
  </div>
</div>

<!-- Modal Detalle Producto -->
<div class="modal-backdrop" id="modal-detalle">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="md-title">Detalle</h3>
      <button class="modal-close" onclick="Modal.close('modal-detalle')"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:1.5rem">
        <img id="md-img" src="" alt="Pastel" style="width:200px;height:200px;border-radius:var(--radius);object-fit:cover;background:var(--bg-3)">
        <div style="flex:1">
          <p id="md-desc" style="font-size:0.95rem;color:var(--text-2);margin-bottom:0.5rem"></p>
          <div id="md-alergenos" style="display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:1rem"></div>
          <span style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em">Selecciona una porción:</span>
          <div class="var-list" id="md-vars"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('modal-detalle')">Cancelar</button>
      <button class="btn btn-primary" id="md-add-btn" onclick="addToCart()"><i class="bi bi-cart-plus"></i> Agregar al carrito</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  let state = {
    page: 0,
    size: 12,
    categoriaId: null,
    totalElements: 0,
    totalPages: 0,
    selectedVariante: null,
    currentProductId: null
  };

  async function loadCategorias() {
    try {
      const res = await API.get('/api/catalogo/categorias');
      const fc = document.getElementById('cat-filters');
      fc.innerHTML = `<button class="btn ${!state.categoriaId ? 'btn-gold' : 'btn-ghost'}" onclick="setCategory(null)">Todos</button>` +
        res.map(c => `<button class="btn ${state.categoriaId===c.id ? 'btn-gold' : 'btn-ghost'}" onclick="setCategory(${c.id})">${c.nombre}</button>`).join('');
    } catch {}
  }

  function setCategory(id) {
    state.categoriaId = id;
    state.page = 0;
    loadCategorias();
    loadProductos();
  }

  async function loadProductos() {
    const grid = document.getElementById('grid-productos');
    grid.innerHTML = Array(4).fill('<div class="card"><div class="skeleton" style="height:180px;margin-bottom:1rem;border-radius:8px"></div><div class="skeleton" style="height:24px;width:70%;margin-bottom:.5rem"></div><div class="skeleton" style="height:16px;width:100%;margin-bottom:.2rem"></div><div class="skeleton" style="height:16px;width:80%"></div></div>').join('');
    
    let url = `/api/catalogo?page=${state.page}&size=${state.size}`;
    if (state.categoriaId) url += `&categoria=${state.categoriaId}`;

    try {
      const res = await API.get(url);
      state.totalElements = res.totalElements || 0;
      state.totalPages = res.totalPages || 0;
      document.getElementById('cat-counts').textContent = `${state.totalElements} productos`;

      if (!res.content || res.content.length === 0) {
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><i class="bi bi-box2"></i><p>No hay productos en esta categoría.</p></div>`;
        return;
      }

      grid.innerHTML = res.content.map(p => `
        <div class="card card-hover">
          <div class="product-img-wrapper">
            <img src="${p.urlFotoPortada || 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&q=80'}" class="product-img" alt="${p.nombre}">
          </div>
          <div class="badge ${p.hayStock ? 'badge-green' : 'badge-red'}" style="margin-bottom:0.75rem">${p.hayStock ? 'Disponible' : 'Agotado'}</div>
          <h3 class="product-title">${p.nombre}</h3>
          <p class="product-desc">${p.descripcion || ''}</p>
          <div class="flex-between">
            <span class="product-price">${fmt.money(p.precioMinimo)}</span>
            <button class="btn btn-outline btn-sm" onclick="openDetalle(${p.id})"><i class="bi bi-eye"></i> Detalle</button>
          </div>
        </div>
      `).join('');
      renderPagination();
    } catch (e) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><i class="bi bi-exclamation-triangle"></i><p>Error cargando catálogo.</p></div>`;
    }
  }

  function renderPagination() {
    const pag = document.getElementById('pagination');
    if (state.totalPages <= 1) { pag.innerHTML = ''; return; }
    
    let html = `<button class="btn btn-outline" ${state.page===0?'disabled':''} onclick="setPage(${state.page-1})"><i class="bi bi-chevron-left"></i> Anteriores</button>`;
    html += `<span style="padding:0.5rem 1rem;color:var(--text-2)">Pág ${state.page+1} de ${state.totalPages}</span>`;
    html += `<button class="btn btn-outline" ${state.page===state.totalPages-1?'disabled':''} onclick="setPage(${state.page+1})">Siguientes <i class="bi bi-chevron-right"></i></button>`;
    pag.innerHTML = html;
  }

  function setPage(p) {
    if (p >= 0 && p < state.totalPages) {
      state.page = p;
      loadProductos();
      document.getElementById('catalogo').scrollIntoView({ behavior: 'smooth' });
    }
  }

  async function openDetalle(id) {
    state.currentProductId = id;
    state.selectedVariante = null;
    document.getElementById('md-vars').innerHTML = '<div class="spin" style="margin:2rem auto;color:var(--gold);font-size:1.5rem"><i class="bi bi-arrow-repeat"></i></div>';
    document.getElementById('md-add-btn').disabled = true;
    Modal.open('modal-detalle');

    try {
      const p = await API.get(`/api/catalogo/${id}`);
      document.getElementById('md-title').textContent = p.nombre;
      document.getElementById('md-img').src = p.urlFotoPortada || 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&q=80';
      document.getElementById('md-desc').textContent = p.descripcion || 'Sin descripción';
      
      const al = document.getElementById('md-alergenos');
      al.innerHTML = (p.listaAlergenos || []).map(a => `<span class="badge badge-yellow" style="font-size:0.65rem"><i class="bi bi-exclamation-triangle"></i> ${a}</span>`).join('');

      const vars = p.variantes || [];
      if (vars.length === 0) {
        document.getElementById('md-vars').innerHTML = '<p class="text-muted" style="font-size:0.85rem">No hay porciones disponibles.</p>';
      } else {
        document.getElementById('md-vars').innerHTML = vars.map(v => `
          <div class="var-item ${!v.activo || v.stockDisponible<=0 ? 'disabled' : ''}" 
               id="var-opt-${v.id}" 
               ${v.activo && v.stockDisponible>0 ? `onclick="selectVar(${v.id}, this)"` : 'style="opacity:0.5;pointer-events:none"'}>
            <span class="var-item-name">${v.nombreVariante} ${!v.activo || v.stockDisponible<=0 ? '(Agotado)' : ''}</span>
            <span class="var-item-price">${fmt.money(v.precio)}</span>
          </div>
        `).join('');
      }
    } catch {
      document.getElementById('md-vars').innerHTML = '<p style="color:var(--red)">No se pudo cargar el detalle.</p>';
    }
  }

  function selectVar(vid, el) {
    state.selectedVariante = vid;
    document.querySelectorAll('.var-item').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('md-add-btn').disabled = false;
  }

  async function addToCart() {
    if (!Auth.isLoggedIn()) {
      Toast.info('Inicia sesión para agregar al carrito');
      setTimeout(() => window.location.href = 'pages/auth/login.html', 1500);
      return;
    }
    if (!state.selectedVariante) return;
    try {
      document.getElementById('md-add-btn').disabled = true;
      document.getElementById('md-add-btn').innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Agregando...';
      
      await API.post('/api/carrito/items', { varianteId: state.selectedVariante, cantidad: 1 });
      Toast.ok('Agregado al carrito');
      Modal.close('modal-detalle');
    } catch (e) {
      Toast.err('Error al agregar: ' + e.message);
    } finally {
      document.getElementById('md-add-btn').innerHTML = '<i class="bi bi-cart-plus"></i> Agregar al carrito';
      document.getElementById('md-add-btn').disabled = false;
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadCategorias();
    loadProductos();
  });
</script>
</body>
</html>
